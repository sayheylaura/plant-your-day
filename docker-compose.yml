services:
  dev:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: plant-your-day-dev
    volumes:
      - .:/code
    working_dir: /code
    command: sleep infinity
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: plant-your-day-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-plantyourday}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
